# Produktion im Homelab-LXC — wird vom Deploy-Workflow per Tailscale-SSH
# kopiert und mit `--env-file stack.env` gestartet.
services:
  qwixx:
    image: ghcr.io/joschkarick-homelab/color-dices:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8090}:80"
    depends_on:
      - peer
      - rooms

  # Raum-Server: hält Spielstände serverseitig — erreichbar nur über den
  # /rooms-Proxy im nginx der App. Verbindungsabbrüche (Standby, App-Wechsel)
  # sind damit unkritisch: Beim Wiederverbinden kommt der Stand vom Server.
  rooms:
    image: ghcr.io/joschkarick-homelab/color-dices:rooms
    restart: unless-stopped

  # PeerJS-Broker als P2P-Fallback (z. B. für ältere Clients)
  peer:
    image: peerjs/peerjs-server:latest
    restart: unless-stopped
