# Lokales Testen: docker compose up --build → http://localhost:8090
services:
  qwixx:
    build: .
    ports:
      - "8090:80"
    depends_on:
      - peer
      - rooms

  # Raum-Server: hält Spielstände serverseitig (Verbindungen dürfen abreißen)
  rooms:
    build:
      context: .
      target: rooms

  peer:
    image: peerjs/peerjs-server:latest
