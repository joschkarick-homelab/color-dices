# Produktion im Homelab-LXC — wird vom Deploy-Workflow per Tailscale-SSH
# kopiert und mit `--env-file stack.env` gestartet.
services:
  qwixx:
    image: ghcr.io/joschkarick-homelab/color-dices:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8090}:80"
    depends_on:
      - peer

  # Eigener PeerJS-Broker für die Signalisierung — erreichbar nur über den
  # /peer-Proxy im nginx der App, kein eigener veröffentlichter Port.
  peer:
    image: peerjs/peerjs-server:latest
    restart: unless-stopped
